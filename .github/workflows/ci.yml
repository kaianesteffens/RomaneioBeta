name: Desktop CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-ci:
    name: Syntax and unit tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: app:app/fretio/src
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            installer/requirements.txt
            installer/requirements.in
            installer/requirements-lock.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r installer/requirements.txt
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          python -m pip install pytest
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            python -m pip install -e .
          fi

      - name: Compile Python sources
        run: python -m compileall -q app test_*.py

      - name: Run safe unit tests
        run: >-
          python -m pytest -q
          --deselect=test_contract_behavior.py::test_contract_parse_romaneio_colado_preserves_shipping_payload
          --deselect=test_cotacao_validation.py::test_enabled_incomplete_provider_returns_clear_status_without_cotacao
          --deselect=test_provider_utils.py::test_coopex_coteir_updates_current_step_before_each_phase
