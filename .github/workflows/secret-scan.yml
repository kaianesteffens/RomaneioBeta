name: Secret Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        run: gitleaks git . --redact --verbose --exit-code 1

      - name: Scan working tree and tracked archives
        # `gitleaks git` only inspects history patches, so it never looks
        # inside tracked archives (installer/repository-assets/*.zip). This
        # extra pass scans the checked-out files and descends into archives.
        run: gitleaks dir . --redact --verbose --exit-code 1 --max-archive-depth 3
