name: Build and Release Fretio

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      HAS_RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN != '' }}
      HAS_UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 != '' }}
      RELEASE_REPO: ${{ vars.RELEASE_REPO || 'kaianesteffens/RomaneioBeta-releases' }}
      RELEASE_REPO_ALIASES: ${{ vars.RELEASE_REPO_ALIASES }}
      UPDATE_PUBLIC_KEY_B64: ${{ vars.UPDATE_PUBLIC_KEY_B64 }}
      ALLOW_UNSIGNED_DEV_RELEASE: ${{ vars.ALLOW_UNSIGNED_DEV_RELEASE || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate update signing configuration
        shell: pwsh
        run: |
          $allowUnsignedDev = $env:ALLOW_UNSIGNED_DEV_RELEASE -eq "true"
          $hasPrivateKey = $env:HAS_UPDATE_SIGNING_KEY -eq "true"
          $hasPublicKey = -not [string]::IsNullOrWhiteSpace($env:UPDATE_PUBLIC_KEY_B64)
          if ((-not $hasPrivateKey -or -not $hasPublicKey) -and -not $allowUnsignedDev) {
            throw "Update signing is required. Configure secret UPDATE_SIGNING_PRIVATE_KEY_B64 and variable UPDATE_PUBLIC_KEY_B64, or set variable ALLOW_UNSIGNED_DEV_RELEASE=true only for explicit dev builds."
          }
          if ($allowUnsignedDev -and (-not $hasPrivateKey -or -not $hasPublicKey)) {
            Write-Warning "Unsigned dev build explicitly allowed. Release updates produced by this run must not be published."
          } else {
            Write-Host "[OK] Update signing configured"
          }

      - name: Inject error reporting credentials
        shell: pwsh
        run: |
          $gistId    = "${{ secrets.ERROR_GIST_ID }}"
          $token     = "${{ secrets.ERROR_REPORT_TOKEN }}"
          $updatePublicKey = $env:UPDATE_PUBLIC_KEY_B64
          $githubRepo = $env:RELEASE_REPO
          $aliasCandidates = @()
          if ($env:RELEASE_REPO_ALIASES) {
            $aliasCandidates += $env:RELEASE_REPO_ALIASES.Split(",") | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }
          if (-not ($aliasCandidates -contains $githubRepo)) {
            $aliasCandidates = @($githubRepo) + $aliasCandidates
          }
          $aliasItems = foreach ($alias in $aliasCandidates) { '"' + ($alias -replace '"', '\"') + '"' }
          $aliasesToml = "[" + ($aliasItems -join ", ") + "]"
          $licenseUrl = "https://gist.githubusercontent.com/kaianesteffens/4a327b33711420ab88f20806e528f906/raw/licenses.json"
          $content = @(
            '[fretio]'
            "github_repo = `"$githubRepo`""
            "github_repo_aliases = $aliasesToml"
            "license_url = `"$licenseUrl`""
            "update_public_key_b64 = `"$updatePublicKey`""
          ) -join "`r`n"
          if ($gistId -and $token) {
            $content += "`r`nerror_gist_id = `"$gistId`""
            $content += "`r`nerror_report_token = `"$token`""
          } else {
            $content += "`r`nerror_gist_id = `"`""
            $content += "`r`nerror_report_token = `"`""
          }
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "app\CONFIG.toml"),
            $content,
            [System.Text.Encoding]::UTF8
          )
          Write-Host "[OK] app\CONFIG.toml gerado para o build"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Run build.bat (official flow)
        working-directory: installer
        shell: cmd
        env:
          CI: 1
        run: build.bat

      - name: Run build_update_zip.bat
        working-directory: installer
        shell: cmd
        env:
          CI: 1
        run: build_update_zip.bat

      - name: Build universal launcher (Romaneio.exe)
        working-directory: installer
        shell: pwsh
        run: |
          python -m pip install --upgrade pip==26.1.1 pyinstaller==6.20.0 --quiet --disable-pip-version-check
          python -m PyInstaller --clean --noconfirm launcher.spec
          if (!(Test-Path "dist\Romaneio.exe")) { throw "Romaneio.exe nao foi gerado" }
          Copy-Item "dist\Romaneio.exe" "installer\Romaneio.exe" -Force
          Write-Host "Launcher gerado: installer\Romaneio.exe"

      - name: Resolve generated artifact paths
        id: meta
        shell: pwsh
        run: |
          $ver = (Get-Content "app\version.txt").Trim()
          $setup = "installer\installer\Fretio-Setup-$ver.exe"
          $zip = "installer\installer\Fretio-Update-$ver.zip"
          $launcher = "installer\installer\Romaneio.exe"
          $distExe = "installer\dist\Fretio\Fretio.exe"

          if (!(Test-Path $distExe)) { throw "Executavel nao encontrado: $distExe" }
          if (!(Test-Path $zip)) { throw "ZIP de update nao encontrado: $zip" }
          if (!(Test-Path $setup)) { throw "Instalador Windows nao encontrado: $setup" }
          if (!(Test-Path $launcher)) { throw "Launcher nao encontrado: $launcher" }

          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Versao:   $ver"
          Write-Host "Setup:    $setup"
          Write-Host "ZIP:      $zip"
          Write-Host "Launcher: $launcher"

      - name: Validate update ZIP
        shell: pwsh
        run: python installer\validate_update_zip.py "installer\installer\Fretio-Update-${{ steps.meta.outputs.version }}.zip"

      - name: Prepare stable repository artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.meta.outputs.version }}"
          $repoDir = Join-Path $PWD "installer\repository-assets"
          $releaseDir = Join-Path $PWD "installer\release-assets"
          $repoMaxBytes = 95MB
          New-Item -ItemType Directory -Force -Path $repoDir | Out-Null
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Get-ChildItem $repoDir -File -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem $releaseDir -File -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue

          $assetMap = @(
            @{ Source = "installer\installer\Fretio-Setup-$ver.exe"; RepoName = "Fretio-Setup-latest.exe"; ReleaseName = "Fretio-Setup-latest.exe" },
            @{ Source = "installer\installer\Fretio-Update-$ver.zip"; RepoName = "Fretio-Update-latest.zip"; ReleaseName = "Fretio-Update-latest.zip" },
            @{ Source = "installer\installer\Fretio-Setup-$ver.exe"; RepoName = "FreteBot-Setup-latest.exe"; ReleaseName = "FreteBot-Setup-latest.exe" },
            @{ Source = "installer\installer\Fretio-Update-$ver.zip"; RepoName = "FreteBot-Update-latest.zip"; ReleaseName = "FreteBot-Update-latest.zip" },
            @{ Source = "installer\installer\Romaneio.exe"; RepoName = "Romaneio.exe"; ReleaseName = "Romaneio.exe" }
          )
          $committedAssets = @()
          $skippedRepoAssets = @()

          foreach ($asset in $assetMap) {
            $sourcePath = Join-Path $PWD $asset.Source
            $releasePath = Join-Path $releaseDir $asset.ReleaseName
            Copy-Item $sourcePath $releasePath -Force

            $size = (Get-Item $sourcePath).Length
            if ($size -le $repoMaxBytes) {
              Copy-Item $sourcePath (Join-Path $repoDir $asset.RepoName) -Force
              $committedAssets += $asset.RepoName
            } else {
              $skippedRepoAssets += @{
                name = $asset.RepoName
                size_bytes = $size
                reason = "github_file_limit"
              }
            }
          }

          $releaseAliases = @($env:RELEASE_REPO)
          if ($env:RELEASE_REPO_ALIASES) {
            $releaseAliases += $env:RELEASE_REPO_ALIASES.Split(",") | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }
          $manifest = @{
            version = $ver
            release_repo = $env:RELEASE_REPO
            release_repo_aliases = $releaseAliases | Select-Object -Unique
            release_assets = @(
              "Fretio-Setup-latest.exe",
              "Fretio-Update-latest.zip",
              "Fretio-Update-latest.zip.sig",
              "FreteBot-Setup-latest.exe",
              "FreteBot-Update-latest.zip",
              "FreteBot-Update-latest.zip.sig",
              "Romaneio.exe"
            )
            committed_repo_assets = $committedAssets
            skipped_repo_assets = $skippedRepoAssets
            repo_asset_max_bytes = $repoMaxBytes
          } | ConvertTo-Json -Depth 4
          Set-Content -Path (Join-Path $repoDir "latest.json") -Value $manifest -Encoding UTF8
          Write-Host "Artefatos de release preparados em installer\release-assets"
          Write-Host "Artefatos committaveis preparados em installer\repository-assets"

      - name: Sign update ZIP assets
        shell: pwsh
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          if (-not $env:UPDATE_SIGNING_PRIVATE_KEY_B64) {
            if ($env:ALLOW_UNSIGNED_DEV_RELEASE -eq "true") {
              Write-Warning "Assinatura ignorada somente porque ALLOW_UNSIGNED_DEV_RELEASE=true."
              exit 0
            }
            throw "UPDATE_SIGNING_PRIVATE_KEY_B64 nao definido; release sem assinatura nao e permitida."
          }

          python -m pip install cryptography==48.0.0 --quiet --disable-pip-version-check
          $ver = "${{ steps.meta.outputs.version }}"
          $targets = @(
            "installer\installer\Fretio-Update-$ver.zip",
            "installer\release-assets\Fretio-Update-latest.zip",
            "installer\release-assets\FreteBot-Update-latest.zip",
            "installer\repository-assets\Fretio-Update-latest.zip",
            "installer\repository-assets\FreteBot-Update-latest.zip"
          )
          foreach ($target in $targets) {
            if (Test-Path $target) {
              python installer\sign_update_asset.py $target "$target.sig"
              if ($LASTEXITCODE -ne 0) { throw "Falha ao assinar $target" }
            }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fretio-windows-v${{ steps.meta.outputs.version }}
          if-no-files-found: error
          path: |
            installer/dist/Fretio/**
            installer/installer/Fretio-Setup-${{ steps.meta.outputs.version }}.exe
            installer/installer/Fretio-Update-${{ steps.meta.outputs.version }}.zip
            installer/installer/Fretio-Update-${{ steps.meta.outputs.version }}.zip.sig
            installer/installer/Romaneio.exe
            installer/release-assets/**
            installer/repository-assets/**

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/version.txt installer/repository-assets
          if git diff --cached --quiet; then
            echo "Sem alteracao de versao para commit"
            exit 0
          fi
          git commit -m "v${{ steps.meta.outputs.version }}: bump version [skip ci]"
          git push origin HEAD || echo "::warning::Falha ao enviar commit de versao para origin."

      - name: Create GitHub Release
        if: env.HAS_RELEASES_TOKEN == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          $ver = "${{ steps.meta.outputs.version }}"
          $tag = "v$ver"
          $zip = "installer/installer/Fretio-Update-$ver.zip"
          $setup = "installer/installer/Fretio-Setup-$ver.exe"
          $zipLatest = "installer/release-assets/Fretio-Update-latest.zip"
          $zipLatestSig = "installer/release-assets/Fretio-Update-latest.zip.sig"
          $zipLatestLegacy = "installer/release-assets/FreteBot-Update-latest.zip"
          $zipLatestLegacySig = "installer/release-assets/FreteBot-Update-latest.zip.sig"
          $setupLatest = "installer/release-assets/Fretio-Setup-latest.exe"
          $setupLatestLegacy = "installer/release-assets/FreteBot-Setup-latest.exe"
          $zipSig = "$zip.sig"
          $releaseRepo = $env:RELEASE_REPO

          gh release view $tag --repo $releaseRepo 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo $releaseRepo `
              --title "Fretio v$ver" `
              --latest `
              --notes "Build automatico Windows - v$ver"
          }

          $launcher = "installer/installer/Romaneio.exe"
          gh release upload $tag $zip $zipSig $setup $launcher $zipLatest $zipLatestSig $zipLatestLegacy $zipLatestLegacySig $setupLatest $setupLatestLegacy `
            --repo $releaseRepo `
            --clobber

          Write-Host "Release v$ver publicado/atualizado em $releaseRepo"

      - name: Skip external release (no token)
        if: env.HAS_RELEASES_TOKEN != 'true'
        shell: pwsh
        run: Write-Host "RELEASES_TOKEN nao definido; apenas artefatos do workflow foram gerados."
