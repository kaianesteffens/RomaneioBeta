name: Build and Release FreteBot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      HAS_RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Run build.bat (official flow)
        working-directory: installer
        shell: cmd
        env:
          CI: 1
        run: build.bat

      - name: Run build_update_zip.bat
        working-directory: installer
        shell: cmd
        env:
          CI: 1
        run: build_update_zip.bat

      - name: Resolve generated artifact paths
        id: meta
        shell: pwsh
        run: |
          $ver = (Get-Content "app\version.txt").Trim()
          $setup = "installer\installer\Romaneio-Beta-Setup-$ver.exe"
          $zip = "installer\installer\FreteBot-Update-$ver.zip"
          $distExe = "installer\dist\FreteBot\FreteBot.exe"

          if (!(Test-Path $distExe)) { throw "Executavel nao encontrado: $distExe" }
          if (!(Test-Path $zip)) { throw "ZIP de update nao encontrado: $zip" }
          if (!(Test-Path $setup)) { throw "Instalador Windows nao encontrado: $setup" }

          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Versao: $ver"
          Write-Host "Setup:  $setup"
          Write-Host "ZIP:    $zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: romaneio-beta-windows-v${{ steps.meta.outputs.version }}
          if-no-files-found: error
          path: |
            installer/dist/FreteBot/**
            installer/installer/Romaneio-Beta-Setup-${{ steps.meta.outputs.version }}.exe
            installer/installer/FreteBot-Update-${{ steps.meta.outputs.version }}.zip

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/version.txt
          if git diff --cached --quiet; then
            echo "Sem alteracao de versao para commit"
            exit 0
          fi
          git commit -m "v${{ steps.meta.outputs.version }}: bump version [skip ci]"
          git push origin HEAD || echo "::warning::Falha ao enviar commit de versao para origin."

      - name: Create GitHub Release
        if: env.HAS_RELEASES_TOKEN == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          $ver = "${{ steps.meta.outputs.version }}"
          $tag = "v$ver"
          $zip = "installer/installer/FreteBot-Update-$ver.zip"
          $setup = "installer/installer/Romaneio-Beta-Setup-$ver.exe"

          gh release view $tag --repo "kaianesteffens/RomaneioBeta-releases" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo "kaianesteffens/RomaneioBeta-releases" `
              --title "Romaneio Beta v$ver" `
              --latest `
              --notes "Build automatico Windows - v$ver"
          }

          gh release upload $tag $zip $setup `
            --repo "kaianesteffens/RomaneioBeta-releases" `
            --clobber

          Write-Host "Release v$ver publicado/atualizado em RomaneioBeta-releases"

      - name: Skip external release (no token)
        if: env.HAS_RELEASES_TOKEN != 'true'
        shell: pwsh
        run: Write-Host "RELEASES_TOKEN nao definido; apenas artefatos do workflow foram gerados."
