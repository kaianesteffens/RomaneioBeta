[fretio]
fator_cubagem = 6000
cache_dir = "cache"
github_repo = "kaianesteffens/RomaneioBeta-releases"  # Repositório GitHub para auto-update
github_repo_aliases = []  # Repositórios extras/fallback para sobreviver a renomeações
version_api_url = "https://fretio.api.br/api/version/latest"  # Endpoint publico para descobrir latest_version/download_url/mandatory
# license_api_url é o servidor novo de licenças; license_url é o fallback antigo via Gist.
license_api_url = "https://fretio.api.br/api/licenses/validate"
license_config_api_url = "https://fretio.api.br/api/licenses/config"
# A resposta de /api/licenses/config pode aplicar overrides por licença
# (allow_*, carriers_enabled, cep_origem, fator_cubagem) sem substituir credenciais locais.
license_url = "https://gist.githubusercontent.com/kaianesteffens/4a327b33711420ab88f20806e528f906/raw/licenses.json"
# error_api_url é o servidor novo de erros; error_gist_id/error_report_token são fallback antigo via Gist.
error_api_url = "https://fretio.api.br/api/errors"
usage_api_url = "https://fretio.api.br/api/usage/events"
quotation_jobs_api_url = "https://fretio.api.br/api/quotations/jobs"
# Endpoint opcional/best-effort para normalizacao remota de payloads de cotacao.
# Falhas neste endpoint nao devem impedir a cotacao local.
quotation_normalization_api_url = "https://fretio.api.br/api/quotations/normalize"
# Modo sombra opcional: compara normalizacao remota com dados locais sem alterar a cotacao.
quotation_normalization_shadow_enabled = false
error_gist_id = ""  # ID do gist para envio automático de erros
error_report_token = ""  # Token GitHub com scope 'gist' para envio de erros

